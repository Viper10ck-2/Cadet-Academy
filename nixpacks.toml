# Nixpacks configuration for Cadet Academy
# Fixes bootstrap/cache permissions and storage directories

[phases.build]
cmds = [
    "mkdir -p /app/bootstrap/cache && chmod -R 775 /app/bootstrap/cache",
    "mkdir -p /app/storage/framework/cache /app/storage/framework/sessions /app/storage/framework/views /app/storage/logs",
    "chmod -R 775 /app/storage"
]

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"
